<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>در حال بروزرسانی</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #070b17; color: #e0e6f0; font-family: 'Rajdhani', 'Arial', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background-image: radial-gradient(circle at 20% 30%, rgba(26,92,255,0.08) 0%, transparent 60%), radial-gradient(circle at 80% 70%, rgba(0,212,255,0.06) 0%, transparent 50%); }
        .container { max-width: 700px; width: 100%; background: rgba(10,16,30,0.85); backdrop-filter: blur(12px); border-radius: 40px; padding: 50px 40px 55px; border: 1px solid rgba(26,92,255,0.15); box-shadow: 0 30px 80px rgba(0,0,0,0.8); text-align: center; position: relative; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg at 50% 50%, rgba(26,92,255,0.03), rgba(0,212,255,0.03), rgba(26,92,255,0.03), rgba(0,212,255,0.03)); animation: rotateGlow 20s linear infinite; pointer-events: none; }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .logo { position: relative; z-index: 1; margin-bottom: 15px; }
        .logo h1 { font-family: 'Orbitron', 'Arial', sans-serif; font-weight: 900; font-size: 2.8rem; background: linear-gradient(135deg, #00d4ff, #1a5cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 40px rgba(0,212,255,0.15); letter-spacing: 3px; }
        .logo .sub { font-family: 'Rajdhani', 'Arial', sans-serif; font-weight: 400; color: #5a7a9a; font-size: 0.95rem; letter-spacing: 4px; margin-top: -4px; -webkit-text-fill-color: #5a7a9a; }
        .icon-box { position: relative; z-index: 1; margin: 30px 0 25px; }
        .icon-box .gear { display: inline-block; font-size: 4.5rem; animation: spin 6s linear infinite; filter: drop-shadow(0 0 30px rgba(26,92,255,0.3)); }
        @keyframes spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
        .main-title { position: relative; z-index: 1; font-family: 'Orbitron', 'Arial', sans-serif; font-weight: 700; font-size: 2rem; color: #e0e6f0; margin-bottom: 12px; letter-spacing: 1px; }
        .main-title span { background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .desc { position: relative; z-index: 1; font-size: 1.1rem; color: #8ab4ff; line-height: 1.8; margin-bottom: 30px; padding: 0 10px; }
        .desc small { display: block; color: #5a7a9a; font-size: 0.85rem; margin-top: 6px; }
        .timer-box { position: relative; z-index: 1; display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .timer-item { background: rgba(0,0,0,0.4); border: 1px solid rgba(26,92,255,0.15); border-radius: 16px; padding: 12px 18px; min-width: 70px; backdrop-filter: blur(4px); }
        .timer-item .num { font-family: 'Orbitron', 'Arial', sans-serif; font-weight: 700; font-size: 2.2rem; color: #00d4ff; display: block; line-height: 1; }
        .timer-item .label { font-size: 0.7rem; color: #5a7a9a; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; display: block; }
        .status-badge { position: relative; z-index: 1; display: inline-block; background: rgba(255,180,70,0.12); border: 1px solid rgba(255,180,70,0.2); padding: 6px 24px; border-radius: 40px; font-size: 0.85rem; color: #ffb347; letter-spacing: 2px; margin-bottom: 8px; }
        .status-badge .dot { display: inline-block; width: 10px; height: 10px; background: #ffb347; border-radius: 50%; margin-left: 8px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
        .footer-note { position: relative; z-index: 1; font-size: 0.8rem; color: #3a5a7a; margin-top: 20px; letter-spacing: 1px; border-top: 1px solid rgba(26,92,255,0.08); padding-top: 18px; }
        @media (max-width: 600px) { .container { padding: 30px 20px 35px; } .logo h1 { font-size: 2rem; } .main-title { font-size: 1.4rem; } .timer-item { padding: 8px 12px; min-width: 55px; } .timer-item .num { font-size: 1.6rem; } .desc { font-size: 0.95rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>⚡ SUPERLEAGUE</h1>
            <div class="sub">SEASON 3 · OFFICIAL</div>
        </div>
        <div class="icon-box">
            <span class="gear">⚙️</span>
        </div>
        <div class="status-badge">
            <span class="dot"></span>
            در حال بروزرسانی
        </div>
        <div class="main-title">
            <span>به‌زودی بازمی‌گردیم</span>
        </div>
        <div class="desc">
            سایت در حال به‌روزرسانی و بهبود عملکرد است.
            <small>لطفاً چند لحظه دیگر مجدداً تلاش کنید.</small>
        </div>
        <div class="timer-box">
            <div class="timer-item">
                <span class="num" id="hours">--</span>
                <span class="label">ساعت</span>
            </div>
            <div class="timer-item">
                <span class="num" id="minutes">--</span>
                <span class="label">دقیقه</span>
            </div>
            <div class="timer-item">
                <span class="num" id="seconds">--</span>
                <span class="label">ثانیه</span>
            </div>
        </div>
        <div class="footer-note">
            تیم پشتیبانی SUPERLEAGUE
        </div>
    </div>
    <script>
        let totalSeconds = 2 * 60 * 60;
        function updateTimer() {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
            if (totalSeconds > 0) totalSeconds--;
            else totalSeconds = 2 * 60 * 60;
        }
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
