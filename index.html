                    { home: 'KakaSiah', away: 'Titans' },
                    { home: 'Dalghak UTD', away: 'Persian Gulf' },
                    { home: 'MadridTvShow', away: 'Richmond' },
                    { home: 'Azabe Elahi FC', away: 'FaridEftekharDoost' },
                    { home: 'Persian Gulf', away: 'Soroush FC' },
                    { home: 'DaryaSalar FC', away: 'MadridTvShow' },
                    { home: 'Vikings', away: 'KakaSiah' },
                    { home: 'Vikings', away: 'FC Weekend' },
                    { home: 'FaridEftekharDoost', away: 'Tehran Legacy' },
                    { home: 'Salmandan', away: 'Tehran Legacy' },
                    { home: 'Heirs Of Persia', away: 'Dalghak UTD' },
                    { home: 'Heirs Of Persia', away: 'Soroush FC' },
                    { home: 'Tehran Legacy', away: 'Verbos' },
                    { home: 'DaryaSalar FC', away: 'Aryamehr FC' },
                    { home: 'Soroush FC', away: 'Galaxy F35' }
                ]
            }
        ];

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RESULTS — تمام بازی‌های انجام‌شده
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        var playedMatches = [
            { home: 'Azabe Elahi FC', away: 'Verbos', score: '4-1' },
            { home: 'Royal Madrid FC', away: 'Titans', score: '0-0' },
            { home: 'MadridTvShow', away: 'ITA', score: '3-1' },
            { home: 'Aryamehr FC', away: 'Richmond', score: '0-1' },
            { home: 'Royal Madrid FC', away: 'FC Weekend', score: '3-0' },
            { home: 'Verbos', away: 'Salmandan', score: '2-2' },
            { home: 'DaryaSalar FC', away: 'ITA', score: '4-2' },
            { home: 'Vikings', away: 'Royal Madrid FC', score: '2-0' },
            { home: 'Galaxy F35', away: 'Persian Gulf', score: '0-6' },
            { home: 'KakaSiah', away: 'Titans', score: '0-1' },
            { home: 'Dalghak UTD', away: 'Persian Gulf', score: '1-11' },
            { home: 'MadridTvShow', away: 'Richmond', score: '8-2' },
            { home: 'Azabe Elahi FC', away: 'FaridEftekharDoost', score: '1-1' },
            { home: 'Persian Gulf', away: 'Soroush FC', score: '0-0' },
            { home: 'DaryaSalar FC', away: 'MadridTvShow', score: '1-6' },
            { home: 'Vikings', away: 'KakaSiah', score: '7-1' },
            { home: 'Vikings', away: 'FC Weekend', score: '5-3' },
            { home: 'FaridEftekharDoost', away: 'Tehran Legacy', score: '6-1' },
            { home: 'Salmandan', away: 'Tehran Legacy', score: '2-1' },
            { home: 'Heirs Of Persia', away: 'Dalghak UTD', score: '10-0' },
            { home: 'Heirs Of Persia', away: 'Soroush FC', score: '5-4' },
            { home: 'Tehran Legacy', away: 'Verbos', score: '3-1' },
            { home: 'DaryaSalar FC', away: 'Aryamehr FC', score: '3-0' },
            { home: 'Soroush FC', away: 'Galaxy F35', score: '8-0' }
        ];

        // ─── Helper ───
        function getMatchResult(home, away) {
            for (var i = 0; i < playedMatches.length; i++) {
                var m = playedMatches[i];
                if ((m.home === home && m.away === away) || (m.home === away && m.away === home)) {
                    if (m.home === home && m.away === away) return m.score;
                    else {
                        var parts = m.score.split('-');
                        return parts[1] + '-' + parts[0];
                    }
                }
            }
            return null;
        }

        function isPlayed(home, away) {
            return getMatchResult(home, away) !== null;
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  RENDER FUNCTIONS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        function renderGroups() {
            var container = document.getElementById('groupsContainer');
            container.innerHTML = '';
            for (var groupLetter in groupsData) {
                if (groupsData.hasOwnProperty(groupLetter)) {
                    var data = groupsData[groupLetter];
                    var card = document.createElement('div');
                    card.className = 'group-card';
                    var header = document.createElement('div');
                    header.className = 'group-header';
                    header.innerHTML = '<h3>GROUP ' + groupLetter + '</h3><span class="update-note">P: ' + data.teams.length + ' teams</span>';
                    card.appendChild(header);
                    var table = document.createElement('table');
                    table.className = 'standings-table';
                    table.innerHTML = '<thead><tr><th>#</th><th>Team</th><th class="num">P</th><th class="num">W</th><th class="num">D</th><th class="num">L</th><th class="num">GD</th><th class="num">PTS</th></tr></thead><tbody id="tbody-' + groupLetter + '"></tbody>';
                    card.appendChild(table);
                    container.appendChild(card);
                    var tbody = document.getElementById('tbody-' + groupLetter);
                    var sorted = data.teams.slice().sort(function(a, b) { return (b.PTS - a.PTS) || (b.GD - a.GD); });
                    for (var idx = 0; idx < sorted.length; idx++) {
                        var team = sorted[idx];
                        var tr = document.createElement('tr');
                        var gdClass = team.GD > 0 ? 'positive' : (team.GD < 0 ? 'negative' : '');
                        tr.innerHTML = '<td class="pos">' + (idx + 1) + '</td><td class="team">' + team.name + '</td><td class="num">' + team.P + '</td><td class="num">' + team.W + '</td><td class="num">' + team.D + '</td><td class="num">' + team.L + '</td><td class="num gd ' + gdClass + '">' + (team.GD > 0 ? '+' : '') + team.GD + '</td><td class="pts">' + team.PTS + '</td>';
                        tbody.appendChild(tr);
                    }
                }
            }
        }

        function renderTopScorers() {
            var list = document.getElementById('scorersList');
            list.innerHTML = '';
            var sorted = topScorers.slice().sort(function(a, b) { return b.goals - a.goals; });
            var shown = 0;
            for (var i = 0; i < sorted.length && shown < 30; i++) {
                var item = sorted[i];
                if (item.goals === 0) continue;
                var li = document.createElement('li');
                var isGold = (i === 0 && item.goals > 0);
                li.innerHTML = '<span class="player"><span class="rank">#' + (shown + 1) + '</span><span class="name">' + item.name + '</span><span class="club">' + item.club + '</span></span><span class="count ' + (isGold ? 'gold' : '') + '">' + item.goals + '</span>';
                list.appendChild(li);
                shown++;
            }
        }

        function renderTopAssists() {
            var list = document.getElementById('assistsList');
            list.innerHTML = '';
            var sorted = topAssists.slice().sort(function(a, b) { return b.assists - a.assists; });
            var shown = 0;
            for (var i = 0; i < sorted.length && shown < 30; i++) {
                var item = sorted[i];
                if (item.assists === 0) continue;
                var li = document.createElement('li');
                var isGold = (i === 0 && item.assists > 0);
                li.innerHTML = '<span class="player"><span class="rank">#' + (shown + 1) + '</span><span class="name">' + item.name + '</span><span class="club">' + item.club + '</span></span><span class="count ' + (isGold ? 'gold' : '') + '">' + item.assists + '</span>';
                list.appendChild(li);
                shown++;
            }
        }

        function renderResults() {
            var container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            if (playedMatches.length === 0) {
                container.innerHTML = '<div class="fixture-card"><p style="color:#7a8ba8;">No results yet.</p></div>';
                return;
            }
            for (var i = 0; i < playedMatches.length; i++) {
                var m = playedMatches[i];
                var card = document.createElement('div');
                card.className = 'result-card';
                var parts = m.score.split('-');
                var isDraw = (parts[0] === parts[1]);
                card.innerHTML = '<div class="match"><span class="teams">' + m.home + ' vs ' + m.away + '</span><span class="result ' + (isDraw ? 'draw' : '') + '">' + m.score + '</span></div>';
                container.appendChild(card);
            }
        }

        function renderFixtures() {
            var container = document.getElementById('fixturesContainer');
            container.innerHTML = '';
            var hasMatch = false;

            for (var d = 0; d < fixturesByDay.length; d++) {
                var dayData = fixturesByDay[d];
                var matches = dayData.matches;

                var card = document.createElement('div');
                card.className = 'fixture-card';
                var html = '<div class="group-header" style="border-bottom:1px solid rgba(26,92,255,0.2);padding-bottom:6px;margin-bottom:8px;"><h3 style="font-family:Orbitron, Arial, sans-serif;font-size:1rem;color:#00d4ff;">📅 ' + dayData.day.toUpperCase() + '</h3></div>';
                var hasMatchInGroup = false;

                for (var mIdx = 0; mIdx < matches.length; mIdx++) {
                    var match = matches[mIdx];
                    var result = getMatchResult(match.home, match.away);
                    var statusHtml = '';
                    if (result) {
                        statusHtml = '<span class="status played">' + result + '</span>';
                    } else if (match.time && match.time !== '') {
                        statusHtml = '<span class="status scheduled">' + match.time + '</span>';
                    } else {
                        statusHtml = '<span class="status pending">⏳ TBD</span>';
                    }
                    html += '<div class="match"><span class="teams">' + match.home + ' vs ' + match.away + '</span>' + statusHtml + '</div>';
                    hasMatchInGroup = true;
                    hasMatch = true;
                }
                card.innerHTML = html;
                if (hasMatchInGroup) container.appendChild(card);
            }

            if (!hasMatch) {
                container.innerHTML = '<div class="fixture-card"><p style="color:#7a8ba8;">All matches have been played.</p></div>';
            }
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TABS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        var tabs = document.querySelectorAll('.nav-tab');
        var pages = {
            standings: document.getElementById('page-standings'),
            results: document.getElementById('page-results'),
            fixtures: document.getElementById('page-fixtures')
        };
        for (var t = 0; t < tabs.length; t++) {
            (function(tab) {
                tab.addEventListener('click', function() {
                    var pageId = this.dataset.page;
                    for (var i = 0; i < tabs.length; i++) {
                        tabs[i].classList.remove('active');
                    }
                    this.classList.add('active');
                    for (var key in pages) {
                        if (pages.hasOwnProperty(key)) {
                            if (key === pageId) pages[key].classList.add('active');
                            else pages[key].classList.remove('active');
                        }
                    }
                });
            })(tabs[t]);
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        renderGroups();
        renderTopScorers();
        renderTopAssists();
        renderResults();
        renderFixtures();
    </script>
</body>
</html>
