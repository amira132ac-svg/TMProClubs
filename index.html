            const sorted = [...topAssists].sort((a, b) => b.assists - a.assists);
            sorted.forEach((item, index) => {
                const li = document.createElement('li');
                const isGold = item.assists === 5;
                li.innerHTML = <span class="player"><span class="rank">#${index + 1}</span><span class="name">${item.name}</span><span class="club">${item.club}</span></span><span class="count ${isGold ? 'gold' : ''}">${item.assists}</span>;
                list.appendChild(li);
            });
        }

        function renderResults() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            if (playedMatches.length === 0) {
                container.innerHTML = <div class="fixture-card"><p style="color:#7a8ba8;">No results yet.</p></div>;
                return;
            }
            playedMatches.forEach(m => {
                const card = document.createElement('div');
                card.className = 'result-card';
                const isDraw = m.score.split('-')[0] === m.score.split('-')[1];
                card.innerHTML = `
                    <div class="match">
                        <span class="teams">${m.home} vs ${m.away}</span>
                        <span class="result ${isDraw ? 'draw' : ''}">${m.score}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderFixtures() {
            const container = document.getElementById('fixturesContainer');
            container.innerHTML = '';
            fixturesByGroup.forEach(group => {
                const card = document.createElement('div');
                card.className = 'fixture-card';
                let html = <div class="group-header" style="border-bottom:1px solid rgba(26,92,255,0.2);padding-bottom:6px;margin-bottom:8px;"><h3 style="font-family:'Orbitron',sans-serif;font-size:1rem;color:#00d4ff;">GROUP ${group.group}</h3></div>;
                group.matches.forEach(match => {
                    const result = getMatchResult(match.home, match.away);
                    let statusHtml = '';
                    if (result) {
                        statusHtml = <span class="status played">${result}</span>;
                    } else {
                        statusHtml = <span class="status pending">⏳ TBD</span>;
                    }
                    html += <div class="match"><span class="teams">${match.home} vs ${match.away}</span>${statusHtml}</div>;
                });
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  TABS
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const tabs = document.querySelectorAll('.nav-tab');
        const pages = {
            standings: document.getElementById('page-standings'),
            results: document.getE

> ᴀᴍɪʀ¹⁶:
lementById('page-results'),
            fixtures: document.getElementById('page-fixtures')
        };
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const pageId = this.dataset.page;
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                Object.keys(pages).forEach(key => pages[key].classList.toggle('active', key === pageId));
            });
        });

        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  INIT
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        renderGroups();
        renderTopScorers();
        renderTopAssists();
        renderResults();
        renderFixtures();
    </script>
</body>
</html>
